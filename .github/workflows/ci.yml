name: main

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
  watch:
    types: [ started ]
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '.github/**'
      - '.idea/**'
      - '!.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Gradle wrapper validation
        uses: gradle/wrapper-validation-action@main

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@main

      - name: Set up JDK
        uses: actions/setup-java@main
        with:
          java-version: 17
          distribution: temurin
          cache: "gradle"

      - name: Set Gradle Conf
        run: |
          mkdir -p ~/.gradle/
          echo 'org.gradle.parallel=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.daemon=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.jvmargs=-XX:+UseParallelGC -Xmx6g -Xms256m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 ' >> ~/.gradle/gradle.properties
          echo 'org.gradle.workers.max=2' >> ~/.gradle/gradle.properties
          echo 'kotlin.incremental=false' >> ~/.gradle/gradle.properties
          echo 'kotlin.compiler.execution.strategy=in-process' >> ~/.gradle/gradle.properties
          echo 'org.gradle.caching=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.configureondemand=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.unsafe.configuration-cache=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.unsafe.configuration-cache-problems=warn' >> ~/.gradle/gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get VersionCode
        run: |
          version_code=$(git rev-parse --short HEAD)
          echo "version_code=$version_code" >> $GITHUB_ENV
          version_number=$(git rev-list --count HEAD)
          echo "version_number=$version_number" >> $GITHUB_ENV

      - name: Build with Gradle
        run: |
          ./gradlew :app:assembleRelease -x lint -x lintVitalRelease \
          --build-cache --parallel --no-daemon \
          -x test -x checkReleaseAarMetadata \
          -x checkKotlinGradlePluginConfigurationErrors \
          -x checkReleaseDuplicateClasses

      - name: Pack APKs with tar.xz
        run: |
          export XZ_OPT="-9 -T8"
          tar -cJf c001apk-Android.tar.xz -C app/build/outputs/apk/release/ .

      - name: Pack mappings (if exists) with tar.xz
        run: |
          if [ -d app/build/outputs/mapping/release ]; then
            export XZ_OPT="-9 -T8"
            tar -cJf mappings.tar.xz -C app/build/outputs/mapping/release/ .
          fi

      - name: Upload APKs artifact
        uses: actions/upload-artifact@v4
        with:
          name: c001apk-Android-txz
          path: c001apk-Android.tar.xz

      - name: Upload mappings artifact (if exists)
        uses: actions/upload-artifact@v4
        with:
          name: c001apk-mappings-txz
          path: mappings.tar.xz
        if: success() && hashFiles('mappings.tar.xz') != ''

      - name: Delete Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3